<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Mascotas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Gestión de Mascotas</h1>
  </header>

  <main>
    <!-- Formulario para registrar mascotas (existing code) -->
    <section>
      <h2>Registrar Mascota</h2>
      <form id="form-mascota">
        <label for="nombre">Nombre de la mascota:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="tipo">Tipo de mascota:</label>
        <select id="tipo" name="tipo" required>
          <option value="">Seleccione un tipo</option>
          <option value="Perro">Perro</option>
          <option value="Gato">Gato</option>
          <option value="Ave">Ave</option>
          <option value="Otro">Otro</option>
        </select>

        <label for="edad">Edad de la mascota:</label>
        <input type="number" id="edad" name="edad" required>

        <label for="propietario">Propietario:</label>
        <select id="propietario" name="propietario" required>
          <option value="">Seleccione un propietario</option>
        </select>

        <button type="submit">Registrar Mascota</button>
      </form>
    </section>

    <!-- Lista de mascotas (existing code) -->
    <section>
      <h2>Lista de Mascotas</h2>
      <ul id="lista-mascotas">
        <!-- Aquí se mostrarán las mascotas registradas -->
      </ul>
    </section>

    <!-- Nuevo formulario para registrar propietarios -->
    <section>
      <h2>Registrar Propietario</h2>
      <form id="form-propietario">
        <label for="nombre-propietario">Nombre del propietario:</label>
        <input type="text" id="nombre-propietario" name="nombre-propietario" required>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required>

        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required>

        <button type="submit">Registrar Propietario</button>
      </form>
    </section>

    <!-- Nueva sección para listar propietarios -->
    <section>
      <h2>Lista de Propietarios</h2>
      <ul id="lista-propietarios">
        <!-- Aquí se mostrarán los propietarios registrados -->
      </ul>
    </section>

    <section>
        <h2>Registrar Veterinario</h2>
        <form id="form-veterinario">
          <label for="nombre-veterinario">Nombre del Veterinario:</label>
          <input type="text" id="nombre-veterinario" name="nombre-veterinario" required>
  
          <label for="especialidad">Especialidad:</label>
          <input type="text" id="especialidad" name="especialidad" required>
  
          <label for="telefono-veterinario">Teléfono:</label>
          <input type="tel" id="telefono-veterinario" name="telefono-veterinario" required>
  
          <button type="submit">Registrar Veterinario</button>
        </form>
      </section>
  
      <!-- Sección para listar veterinarios -->
      <section>
        <h2>Lista de Veterinarios</h2>
        <ul id="lista-veterinarios">
          <!-- Aquí se mostrarán los veterinarios registrados -->
        </ul>
      </section>
  
      <!-- Nuevo formulario para registrar citas médicas -->
      <section>
        <h2>Registrar Cita Médica</h2>
        <form id="form-cita-medica">
          <label for="mascota-cita">Mascota:</label>
          <select id="mascota-cita" name="mascota-cita" required>
            <option value="">Seleccione una mascota</option>
          </select>
  
          <label for="veterinario-cita">Veterinario:</label>
          <select id="veterinario-cita" name="veterinario-cita" required>
            <option value="">Seleccione un veterinario</option>
          </select>
  
          <label for="fecha-cita">Fecha de la Cita:</label>
          <input type="date" id="fecha-cita" name="fecha-cita" required>
  
          <label for="hora-cita">Hora de la Cita:</label>
          <input type="time" id="hora-cita" name="hora-cita" required>
  
          <label for="motivo-consulta">Motivo de la Consulta:</label>
          <textarea id="motivo-consulta" name="motivo-consulta" required></textarea>
  
          <button type="submit">Registrar Cita Médica</button>
        </form>
      </section>
  
      <!-- Sección para listar citas médicas -->
      <section>
        <h2>Citas Médicas</h2>
        <ul id="lista-citas-medicas">
          <!-- Aquí se mostrarán las citas médicas registradas -->
        </ul>
      </section>





  </main>

  <footer>
    <p>&copy; 2025 Gestión de Mascotas</p>
  </footer>

  <script src="./main8.js"></script>
</body>
</html>
