<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Mascotas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Gestión de Mascotas</h1>
  </header>


    <nav class="navegador">
      <ul>
        <li><a href="index.html">Registro Mascota</a></li>
        <li><a href="citasMedicas.html">Creación de Citas</a></li>
      </ul>
    </nav>

    <p>Teste</p>

  <main>
    <!-- Formulario de Registro de Mascota -->
    <section>
      <h2>Registrar Mascota</h2>
      <form id="form-mascota">
        <input type="text" id="nombre" placeholder="Nombre de la mascota" required>
        <select id="tipo" required>
          <option value="">Seleccione un tipo</option>
          <option value="Perro">Perro</option>
          <option value="Gato">Gato</option>
          <option value="Ave">Ave</option>
          <option value="Otro">Otro</option>
        </select>
        <input type="number" id="edad" placeholder="Edad" required>
        <input type="text" id="propietario" placeholder="Nombre del propietario" required>

        <!-- Historial de Vacunación -->
        <h3>Historial de Vacunación</h3>
        <select id="vacunaTipo" required>
          <option value="">Seleccione una vacuna</option>
          <option value="Parvovirus">Parvovirus</option>
          <option value="Triple">Triple</option>
          <option value="Rabia">Rabia</option>
        </select>
        <input type="date" id="fechaVacuna" required>

        <button type="submit">Registrar Mascota</button>
      </form>
    </section>

    <!-- Lista de Mascotas -->
    <section>
      <h2>Mascotas Registradas</h2>
      <ul id="lista-mascotas"></ul>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2025 Gestión de Mascotas</p>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
